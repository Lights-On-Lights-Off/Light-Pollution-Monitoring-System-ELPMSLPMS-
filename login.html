<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NBSC Light Pollution Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #0d6efd;
      --accent-glow: rgba(13, 110, 253, 0.35);
      --card-bg: rgba(10, 10, 14, 0.82);
      --input-bg: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text: #f0f0f0;
      --muted: #7a7a8c;
      --radius: 14px;
      --error: #ef4444;
      --success: #22c55e;
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: #04040a;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.45;
      pointer-events: none;
      z-index: 1;
    }

    .page {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.7), 0 0 60px var(--accent-glow);
      padding: 40px 36px;
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.15s both;
    }

    .badge-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      margin-bottom: 14px;
    }

    .card-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .card-header p {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .form { animation: fadeUp 0.5s 0.25s both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.2); }

    input:focus {
      border-color: var(--accent);
      background: rgba(13,110,253,0.06);
      box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
    }

    input.error-field {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
    }

    .btn-primary {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      pointer-events: none;
    }

    .btn-primary:hover {
      background: #2979ff;
      box-shadow: 0 4px 20px rgba(13,110,253,0.4);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      height: 3px;
      border-radius: 2px;
      margin-bottom: 18px;
      background: transparent;
      transition: background 0.3s ease;
    }
    .alert.error   { background: #ef4444; }
    .alert.success { background: #22c55e; }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.93rem;
      color: var(--muted);
    }

    .form-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .form-footer a:hover { color: #6ea8fe; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .input-group input { transition: border-color 0.18s, box-shadow 0.18s; }
    .input-group input:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.18); outline: none; }
    .input-group input:hover:not(:focus) { border-color: rgba(255,255,255,0.2); }
    .btn-primary { transition: background 0.18s, transform 0.14s, box-shadow 0.18s; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,110,253,0.35); }
    .btn-primary:active { transform: scale(0.97); }
    .card { transition: box-shadow 0.2s; }
    a { transition: color 0.15s; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="page">
    <div class="card">

      <div class="card-header">
        <span class="badge-dot"></span>
        <h1 id="form-title">Welcome Back</h1>
        <p>NBSC Light Pollution Monitoring System</p>
      </div>

      <div id="alert-box" class="alert"></div>

      <!-- Login Form -->
      <form class="form" id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Login</button>
        <div class="form-footer">
          <p>Don't have an account? <a href="#" onclick="switchForm('register')">Register here</a></p>
          <div class="divider"></div>
          <p><a href="index.html">← Back to Dashboard</a></p>
        </div>
      </form>

      <!-- Register Form -->
      <form class="form" id="register-form" style="display:none;" autocomplete="off">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Juan dela Cruz" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-org">Organization <span style="color:#555;font-size:0.7rem;">(optional)</span></label>
          <input type="text" id="reg-org" placeholder="e.g. NBSC" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" required />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Repeat your password" required />
        </div>
        <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
        <div class="form-footer">
          <p>Already have an account? <a href="#" onclick="switchForm('login')">Login here</a></p>
          <div class="divider"></div>
          <p><a href="index.html">← Back to Dashboard</a></p>
        </div>
      </form>

    </div>
  </div>

   <script>
    if (window.location.hash === '#register') {
      switchForm('register');
    }

    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x  = Math.random() * W;
        this.y  = init ? Math.random() * H : H + 10;
        this.r  = Math.random() * 1.6 + 0.3;
        this.vy = -(Math.random() * 0.4 + 0.1);
        this.vx = (Math.random() - 0.5) * 0.15;
        this.alpha = Math.random() * 0.5 + 0.1;
        this.color = Math.random() > 0.6
          ? `rgba(13,110,253,${this.alpha})`
          : `rgba(255,255,255,${this.alpha * 0.6})`;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.y < -10) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    for (let i = 0; i < 120; i++) particles.push(new Particle());

    function drawGlow() {
      const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.55);
      grd.addColorStop(0,   'rgba(13,110,253,0.07)');
      grd.addColorStop(0.5, 'rgba(13,110,253,0.02)');
      grd.addColorStop(1,   'rgba(4,4,10,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#04040a';
      ctx.fillRect(0, 0, W, H);
      drawGlow();
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    const DEFAULT_USERS = [
      { email: 'user@example.com',    password: 'user1234', name: 'Default User', org: 'NBSC', role: 'user'    },
      { email: 'manager@example.com', password: 'manager1', name: 'NBSC Manager', org: 'NBSC', role: 'manager' },
      { email: 'admin@example.com',   password: 'admin123', name: 'NBSC Admin',   org: 'NBSC', role: 'admin'   },
    ];

    (function seedDefaults() {
      const raw   = localStorage.getItem('nbsc_users');
      let users   = raw ? JSON.parse(raw) : [];
      let changed = false;
      DEFAULT_USERS.forEach(def => {
        if (!users.find(u => u.email === def.email)) {
          users.push(def);
          changed = true;
        }
      });
      if (changed) localStorage.setItem('nbsc_users', JSON.stringify(users));
    })();

    function getUsers() {
      const raw = localStorage.getItem('nbsc_users');
      return raw ? JSON.parse(raw) : [...DEFAULT_USERS];
    }

    function saveUsers(users) {
      localStorage.setItem('nbsc_users', JSON.stringify(users));
    }

    function switchForm(type) {
      const alertBox = document.getElementById('alert-box');
      alertBox.className = 'alert';

      if (type === 'register') {
        document.getElementById('login-form').style.display    = 'none';
        document.getElementById('register-form').style.display = 'block';
        document.getElementById('form-title').textContent = 'Create Account';
      } else {
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('login-form').style.display    = 'block';
        document.getElementById('form-title').textContent = 'Welcome Back';
      }
    }

    function showAlert(type) {
      const box = document.getElementById('alert-box');
      box.className = `alert ${type}`;
    }
