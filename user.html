<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Dashboard — NBSC Light Pollution Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --stroke: rgba(255,255,255,0.08);
      --radius: 10px;
      --accent: #0d6efd;
      --card-bg: #050203;
      --body-bg: #252324;
      --text: #fff;
      --muted: #a5a5a5;
      --low: #22c55e;
      --moderate: #f59e0b;
      --high: #ef4444;
    }
    html, body {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      background: var(--body-bg);
      color: var(--text);
      height: 100%;
      overflow-x: hidden;
      overflow-y: scroll;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 72px;
      background: #050203;
      border-bottom: 1px solid var(--stroke);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: .4px;
      color: #fff;
      white-space: nowrap;
      text-decoration: none;
    }
    .brand-badge {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    .user-menu-wrapper { position: relative; }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px 6px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--stroke);
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .user-pill:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .user-avatar-circle {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .user-pill-info { display: flex; flex-direction: column; line-height: 1.25; }
    .user-pill-name  { font-size: 1rem; font-weight: 600; color: #fff; }
    .user-pill-email { font-size: 0.95rem; color: var(--muted); }

    .user-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 230px;
      background: #1a1818;
      border: 1px solid var(--stroke);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      overflow: hidden;
      z-index: 9999;
      animation: fadeIn 0.15s ease;
    }
    .user-dropdown.open { display: block; }
    .dropdown-user-info {
      padding: 14px 16px;
      border-bottom: 1px solid var(--stroke);
    }
    .dropdown-user-name  { font-size: 1.15rem; font-weight: 600; color: #fff; }
    .dropdown-user-email { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }
    .dropdown-item-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: #e0e0e0;
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .dropdown-item-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .dropdown-item-btn.danger { color: #fca5a5; }
    .dropdown-item-btn.danger:hover { background: rgba(239,68,68,0.1); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

    .dashboard-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 16px 24px;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--card-bg);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 5px;
      margin-bottom: 12px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 14px;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .tab-btn.active { background: rgba(13,110,253,0.15); color: #fff; border-bottom: 2px solid var(--accent); }

    .tab-content { display: none; animation: fadeIn 0.2s ease; }
    .tab-content.active { display: block; }

    .dash-card {
      background: var(--card-bg);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .dash-card h4 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 3px;
    }
    .dash-card .card-sub {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .request-item {
      background: #0d0c0e;
      border: 1px solid var(--stroke);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .request-item:hover { border-color: rgba(13,110,253,0.3); }
    .request-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .request-id { font-size: 0.95rem; font-weight: 600; color: var(--accent); font-family: monospace; }
    .status-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.97rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .status-badge.pending  { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .status-badge.approved { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .status-badge.rejected { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .request-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .meta-item label { font-size: 0.95rem; color: var(--muted); display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
    .meta-item span  { font-size: 1rem; color: #e0e0e0; }
    .btn-delete {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 6px;
      color: #f87171;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    .request-item-actions {
      display: flex; align-items: center; gap: 8px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--stroke);
    }

    .btn-download {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 6px;
      color: #4ade80;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.14s;
    }
    .btn-download:hover  { background: rgba(34,197,94,0.22); transform: translateY(-1px); }
    .btn-download:active { transform: scale(0.97); }

    .empty-state {
      text-align: center;
      padding: 36px 20px;
      color: var(--muted);
      font-size: 1.15rem;
    }
    .empty-state .empty-icon { font-size: 2.4rem; margin-bottom: 10px; }
