<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager - NBSC Light Pollution Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #0d6efd;
      --accent-g: rgba(13,110,253,0.14);
      --stroke:   rgba(255,255,255,0.08);
      --card:     #050203;
      --body:     #252324;
      --sidebar:  #050203;
      --radius:   10px;
      --text:     #f0f0f0;
      --muted:    #a5a5a5;
      --low:      #22c55e;
      --moderate: #f59e0b;
      --high:     #ef4444;
      --sidebar-w: 230px;
    }

    html, body {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      background: var(--body);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    /* ── Background Canvas ── */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── App Shell ── */
    .shell {
      position: relative; z-index: 1;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ──────────────────────────
       SIDEBAR
    ────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--stroke);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 18px 16px 16px;
      border-bottom: 1px solid var(--stroke);
    }
    .brand-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }
    .brand-texts h2 {
      font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.2;
    }
    .brand-texts p {
      font-size: 0.8rem; color: var(--muted); margin-top: 1px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 10px 8px;
      overflow-y: auto;
    }
    .nav-section-lbl {
      font-size: 0.75rem; font-weight: 600;
      color: rgba(165,165,165,0.45);
      letter-spacing: 1.1px; text-transform: uppercase;
      padding: 10px 10px 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      color: var(--muted);

      font-size: 1rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.17s, color 0.17s;
      margin-bottom: 1px;
      border: none; background: transparent; width: 100%; text-align: left;
    }
    .nav-item svg { flex-shrink: 0; opacity: 0.65; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item:hover svg { opacity: 1; }
    .nav-item.active {
      background: var(--accent-g); color: #fff;
      border-left: 2px solid var(--accent);
      padding-left: 8px;
    }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 10px 8px 14px;
      border-top: 1px solid var(--stroke);
    }
    .logout-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 9px 10px;
      background: transparent;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      color: #f87171;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.17s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.08); }

    /* ──────────────────────────
       MAIN AREA
    ────────────────────────── */
    .main {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      height: 64px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
    }
    #page-title { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .topbar-sub { font-size: 0.97rem; color: var(--muted); margin-top: 1px; }

    .manager-pill {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 14px 5px 7px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--stroke);
      border-radius: 30px;
    }
    .manager-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.97rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    #manager-name { font-size: 1rem; font-weight: 600; color: #fff; }

    /* Scrollable content */
    .content-area {
      flex: 1;
      overflow-y: scroll;
      padding: 18px 22px 32px;
    }

    /* ──────────────────────────
       STAT CARDS
    ────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 13px;
    }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon.clr-pending  { background: rgba(245,158,11,0.12); }
    .stat-icon.clr-approved { background: rgba(34,197,94,0.12); }
