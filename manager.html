<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager - NBSC Light Pollution Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #0d6efd;
      --accent-g: rgba(13,110,253,0.14);
      --stroke:   rgba(255,255,255,0.08);
      --card:     #050203;
      --body:     #252324;
      --sidebar:  #050203;
      --radius:   10px;
      --text:     #f0f0f0;
      --muted:    #a5a5a5;
      --low:      #22c55e;
      --moderate: #f59e0b;
      --high:     #ef4444;
      --sidebar-w: 230px;
    }

    html, body {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      background: var(--body);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    /* ── Background Canvas ── */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── App Shell ── */
    .shell {
      position: relative; z-index: 1;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ──────────────────────────
       SIDEBAR
    ────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--stroke);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 18px 16px 16px;
      border-bottom: 1px solid var(--stroke);
    }
    .brand-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }
    .brand-texts h2 {
      font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.2;
    }
    .brand-texts p {
      font-size: 0.8rem; color: var(--muted); margin-top: 1px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 10px 8px;
      overflow-y: auto;
    }
    .nav-section-lbl {
      font-size: 0.75rem; font-weight: 600;
      color: rgba(165,165,165,0.45);
      letter-spacing: 1.1px; text-transform: uppercase;
      padding: 10px 10px 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      color: var(--muted);

      font-size: 1rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.17s, color 0.17s;
      margin-bottom: 1px;
      border: none; background: transparent; width: 100%; text-align: left;
    }
    .nav-item svg { flex-shrink: 0; opacity: 0.65; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item:hover svg { opacity: 1; }
    .nav-item.active {
      background: var(--accent-g); color: #fff;
      border-left: 2px solid var(--accent);
      padding-left: 8px;
    }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 10px 8px 14px;
      border-top: 1px solid var(--stroke);
    }
    .logout-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 9px 10px;
      background: transparent;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      color: #f87171;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.17s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.08); }

    /* ──────────────────────────
       MAIN AREA
    ────────────────────────── */
    .main {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      height: 64px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
    }
    #page-title { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .topbar-sub { font-size: 0.97rem; color: var(--muted); margin-top: 1px; }

    .manager-pill {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 14px 5px 7px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--stroke);
      border-radius: 30px;
    }
    .manager-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.97rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    #manager-name { font-size: 1rem; font-weight: 600; color: #fff; }

    /* Scrollable content */
    .content-area {
      flex: 1;
      overflow-y: scroll;
      padding: 18px 22px 32px;
    }

    /* ──────────────────────────
       STAT CARDS
    ────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 13px;
    }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon.clr-pending  { background: rgba(245,158,11,0.12); }
    .stat-icon.clr-approved { background: rgba(34,197,94,0.12); }

    .stat-icon.clr-high     { background: rgba(239,68,68,0.12); }
    .stat-icon.clr-blue     { background: rgba(13,110,253,0.12); }
    .stat-num   { font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1; }
    .stat-lbl   { font-size: 0.97rem; color: var(--muted); margin-top: 3px; }

    /* ──────────────────────────
       SECTIONS
    ────────────────────────── */
    .section { display: none; animation: fadeIn 0.2s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    /* ──────────────────────────
       CARD
    ────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--stroke);
    }
    .card-head h3 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .card-body  { padding: 14px 18px; }
    .card-head-actions { display: flex; align-items: center; gap: 10px; }

    /* ──────────────────────────
       DASHBOARD GRID
    ────────────────────────── */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .mini-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--stroke);
      font-size: 0.97rem;
    }
    .mini-item:last-child { border-bottom: none; }
    .mini-item strong { color: #fff; }
    .mini-item-left { display: flex; flex-direction: column; gap: 2px; }
    .mini-item-name { font-size: 0.97rem; color: #fff; font-weight: 500; }
    .mini-item-email { font-size: 0.95rem; color: var(--muted); }

    /* ──────────────────────────
       TABLE
    ────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.97rem; }
    thead tr { border-bottom: 1px solid var(--stroke); }
    th {
      padding: 9px 14px;
      text-align: left; font-size: 0.82rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    td {
      padding: 10px 14px;
      color: #e0e0e0;
      border-bottom: 1px solid rgba(255,255,255,0.035);
      vertical-align: middle;
    }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody tr:last-child td { border-bottom: none; }
    .td-actions { display: flex; gap: 6px; align-items: center; }

    /* ──────────────────────────
       BADGES
    ────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 20px;
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.3px;
    }
    .badge.pending  { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .badge.approved { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge.denied   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .badge.low      { background: rgba(34,197,94,0.12);  color: var(--low);      border: 1px solid rgba(34,197,94,0.3); }
    .badge.moderate { background: rgba(245,158,11,0.12); color: var(--moderate); border: 1px solid rgba(245,158,11,0.3); }
    .badge.high     { background: rgba(239,68,68,0.12);  color: var(--high);     border: 1px solid rgba(239,68,68,0.3); }

    /* ──────────────────────────
       BUTTONS
    ────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 7px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.97rem; font-weight: 500;
      cursor: pointer; border: none;
      transition: background 0.17s, transform 0.12s;
      white-space: nowrap;
    }
    .btn-sm { padding: 5px 10px; font-size: 0.97rem; border-radius: 6px; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2979ff; transform: translateY(-1px); }

    .btn-success  { background: rgba(34,197,94,0.14);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .btn-success:hover  { background: rgba(34,197,94,0.24); }
    .btn-warn     { background: rgba(245,158,11,0.14); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .btn-warn:hover     { background: rgba(245,158,11,0.24); }
    .btn-danger   { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .btn-danger:hover   { background: rgba(239,68,68,0.22); }
    .btn-ghost    { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--stroke); }
    .btn-ghost:hover    { background: rgba(255,255,255,0.09); color: #fff; }

    /* ──────────────────────────
       FILTER SELECT
    ────────────────────────── */
    .filter-select {
      background: rgba(255,255,255,0.04);
      color: #fff; border: 1px solid var(--stroke);
      border-radius: 7px; padding: 7px 11px;
      font-family: 'Outfit', sans-serif; font-size: 0.95rem;
      cursor: pointer; outline: none;
    }
    .filter-select option { background: #1a1818; }

    /* ──────────────────────────
       BUILDINGS GRID
    ────────────────────────── */
    .buildings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
      padding: 16px 18px;
    }
    .building-card {
      background: #0d0c0e;
      border: 1px solid var(--stroke);
      border-radius: 9px; padding: 15px;
      transition: border-color 0.2s;
    }
    .building-card:hover { border-color: rgba(13,110,253,0.3); }
    .bc-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .bc-head h4 { font-size: 1rem; font-weight: 600; color: #fff; }
    .bc-desc { font-size: 0.9rem; color: var(--muted); margin-bottom: 7px; line-height: 1.5; }
    .bc-coords { font-size: 0.82rem; color: rgba(165,165,165,0.55); font-family: monospace; margin-bottom: 11px; }
    .bc-actions { display: flex; gap: 7px; }

    /* ──────────────────────────
       MAP
    ────────────────────────── */
    #manager-campus-map {
      width: 100%; height: 450px;
      border-radius: 0;
    }
    .map-legend {
      display: flex; gap: 20px; flex-wrap: wrap;
      padding: 11px 18px;
      border-top: 1px solid var(--stroke);
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.93rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.low      { background: var(--low); }
    .legend-dot.moderate { background: var(--moderate); }
    .legend-dot.high     { background: var(--high); }

    /* ──────────────────────────
       EMPTY STATE
    ────────────────────────── */
    .empty-state {
      text-align: center; padding: 44px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.97rem; }

    /* ──────────────────────────
       MODAL
    ────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #0f0e10;
      border: 1px solid var(--stroke);
      border-radius: 14px; width: 100%; max-width: 520px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      animation: modalIn 0.22s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:none; } }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px; border-bottom: 1px solid var(--stroke);
    }
    .modal-head h3 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--stroke); background: transparent;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: background 0.15s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.06); color: #fff; }
