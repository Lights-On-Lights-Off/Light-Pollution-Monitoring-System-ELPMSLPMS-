<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager - NBSC Light Pollution Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #0d6efd;
      --accent-g: rgba(13,110,253,0.14);
      --stroke:   rgba(255,255,255,0.08);
      --card:     #050203;
      --body:     #252324;
      --sidebar:  #050203;
      --radius:   10px;
      --text:     #f0f0f0;
      --muted:    #a5a5a5;
      --low:      #22c55e;
      --moderate: #f59e0b;
      --high:     #ef4444;
      --sidebar-w: 230px;
    }

    html, body {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      background: var(--body);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    /* ── Background Canvas ── */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── App Shell ── */
    .shell {
      position: relative; z-index: 1;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ──────────────────────────
       SIDEBAR
    ────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--stroke);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 18px 16px 16px;
      border-bottom: 1px solid var(--stroke);
    }
    .brand-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }
    .brand-texts h2 {
      font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.2;
    }
    .brand-texts p {
      font-size: 0.8rem; color: var(--muted); margin-top: 1px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 10px 8px;
      overflow-y: auto;
    }
    .nav-section-lbl {
      font-size: 0.75rem; font-weight: 600;
      color: rgba(165,165,165,0.45);
      letter-spacing: 1.1px; text-transform: uppercase;
      padding: 10px 10px 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      color: var(--muted);
